<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fresh — web UI (real editor)</title>
<!--
  Non-terminal UI for Fresh, wired END-TO-END to the REAL Rust editor — no mocks.
  Serve it with the bridge (which hosts a real `Editor`):
     cargo run -p fresh-editor --example webui_server -- 127.0.0.1:8137 <files...>
  then open http://127.0.0.1:8137 .

  Chrome (menu bar, tabs, split panes + dividers, status bar) is DOM/CSS, rendered
  from the editor's real ChromeSnapshot. The text body is SVG <text>/<tspan>,
  rendered from real buffer contents. Keystrokes are POSTed to /key and run through
  the real `Editor::handle_key`; the page re-renders from the editor's new state.

  Partial wire (more coming): keyboard editing is fully live. Tab/divider/menu
  clicks and a live caret are wired next.
-->
<style>
  :root{
    --bg:#1e1e1e;--bg2:#252526;--bg3:#2d2d30;--fg:#d4d4d4;--muted:#9aa0a6;
    --accent:#0a84ff;--border:#3a3a3a;--tab-active:#1e1e1e;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{display:flex;flex-direction:column;height:100vh;background:var(--bg);color:var(--fg);
    font:13px/1.4 -apple-system,Segoe UI,Roboto,system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    user-select:none;overflow:hidden}
  .menubar{display:flex;gap:2px;background:var(--bg3);border-bottom:1px solid var(--border);
    padding:2px 4px;flex:0 0 auto}
  .menu{background:none;border:0;color:var(--fg);padding:4px 10px;border-radius:5px;font:inherit;cursor:default}
  .menu:hover{background:var(--accent);color:#fff}
  .workspace{flex:1 1 auto;display:flex;min-height:0}
  .workspace>*{flex:1 1 auto}
  .split{display:grid;min-height:0;min-width:0;width:100%;height:100%}
  .divider{background:var(--border)}
  .divider.vertical{cursor:col-resize}.divider.horizontal{cursor:row-resize}
  .pane{display:flex;flex-direction:column;min-height:0;min-width:0;border:1px solid var(--border);background:var(--bg)}
  .pane.active{border-color:#454545}
  .tabbar{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex:0 0 auto;overflow:hidden}
  .tab{display:flex;align-items:center;gap:8px;padding:6px 10px;color:var(--muted);
    border-right:1px solid var(--border);max-width:240px}
  .tab.active{background:var(--tab-active);color:var(--fg);box-shadow:inset 0 2px 0 var(--accent)}
  .tab-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .content{flex:1 1 auto;min-height:0;overflow:auto;position:relative}
  svg.textbody{display:block;width:100%;min-height:100%;
    font-family:ui-monospace,SFMono-Regular,JetBrains Mono,Menlo,Consolas,monospace;font-size:13px}
  .gutter{fill:var(--muted);opacity:.55}
  .statusbar{display:flex;justify-content:space-between;background:var(--accent);color:#fff;
    padding:2px 10px;font-size:12px;flex:0 0 auto}
  #err{position:fixed;left:0;right:0;bottom:0;background:#5a1d1d;color:#fff;padding:6px 12px;display:none}
</style>
</head>
<body>
<div id="app"></div>
<div id="err"></div>

<script>
"use strict";
// --------------------------------------------------------------------------
// Real-editor client. NO local model: every render comes from /state, every
// edit is POSTed to /key and applied by the real Rust Editor.
// --------------------------------------------------------------------------
let view = null; // { chrome:{menubar, split_layout, overlays, active_buffer, divider_count}, active, buffers:{id:{name,lines}} }

const esc = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// Toy syntax coloring for display (the real highlighter is wired next).
const SYNTAX=[
  [/\b(fn|let|pub|use|mut|struct|enum|impl|match|if|else|for|while|return|self|crate|mod|const|async|await|move|where|trait|type)\b/,"#569cd6"],
  [/\b([A-Z][A-Za-z0-9_]*)\b/,"#4ec9b0"],
  [/"[^"]*"/,"#ce9178"],[/\/\/.*$/,"#6a9955"],[/\b(\d+)\b/,"#b5cea8"],
];
function highlight(line){
  const marks=new Array(line.length).fill("#d4d4d4");
  for(const [re,color] of SYNTAX){const g=new RegExp(re.source,"g");let m;while((m=g.exec(line))){for(let i=m.index;i<m.index+m[0].length;i++)marks[i]=color;if(m.index===g.lastIndex)g.lastIndex++;}}
  const runs=[];let i=0;while(i<line.length){let j=i;const c=marks[i];while(j<line.length&&marks[j]===c)j++;runs.push({t:line.slice(i,j),c});i=j;}
  return runs;
}

function render(){
  if(!view){document.getElementById("app").textContent="connecting to editor…";return;}
  const ch=view.chrome;
  let h=`<nav class="menubar" role="menubar">`;
  (ch.menubar||[]).forEach((label,i)=>{h+=`<button class="menu" data-menu="${i}">${esc(label)}</button>`;});
  h+=`</nav><main class="workspace">${renderNode(ch.split_layout)}</main>`;
  const ab=view.buffers[String(view.active)];
  h+=`<footer class="statusbar"><span>${esc(ab?ab.name:"")}</span>`+
     `<span>buffer#${view.active} · ${ab?ab.lineCount:0} lines · live · real Editor (handle_key)</span></footer>`;
  document.getElementById("app").innerHTML=h;
}

function renderNode(node){
  if(!node) return "";
  if(node.Leaf) return renderPane(node.Leaf.buffer_id);
  if(node.Grouped) return renderNode(node.Grouped.layout);
  if(node.Split){
    const sp=node.Split, a=Math.round(sp.ratio*100), b=100-a;
    const vert=sp.direction==="Vertical";
    const cls=vert?"split vertical":"split horizontal";
    const style=vert?`grid-template-columns:${a}fr 6px ${b}fr`:`grid-template-rows:${a}fr 6px ${b}fr`;
    const dcls=vert?"divider vertical":"divider horizontal";
    return `<div class="${cls}" style="${style}">${renderNode(sp.first)}<div class="${dcls}"></div>${renderNode(sp.second)}</div>`;
  }
  return "";
}
function renderPane(bid){
  const b=view.buffers[String(bid)]||{name:"buffer#"+bid,lines:[]};
  const active=bid===view.active;
  let h=`<section class="pane${active?' active':''}" data-pane="${bid}">`;
  h+=`<div class="tabbar" role="tablist"><div class="tab${active?' active':''}" data-buffer="${bid}"><span class="tab-label">${esc(b.name)}</span></div></div>`;
  h+=`<div class="content"><svg class="textbody" data-svg="${bid}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMin meet" height="${Math.max(1,b.lines.length)*19}">`;
  const gw=46;
  for(let i=0;i<b.lines.length;i++){
    const y=(i+1)*19-5;
    h+=`<text class="gutter" x="${gw-10}" y="${y}" text-anchor="end">${i+1}</text><text x="${gw}" y="${y}" xml:space="preserve">`;
    let col=0;for(const r of highlight(b.lines[i])){const x=gw+col*7.9;h+=`<tspan x="${x.toFixed(1)}" fill="${r.c}">${esc(r.t)}</tspan>`;col+=r.t.length;}
    h+=`</text>`;
  }
  h+=`</svg></div></section>`;
  return h;
}

// --- bridge to the real editor ---
async function refresh(){ const r=await fetch("/state"); view=await r.json(); render(); }
async function sendKey(desc){
  try{ const r=await fetch("/key",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(desc)});
       view=await r.json(); render(); }
  catch(e){ showErr("key send failed: "+e); }
}
function showErr(m){ const e=document.getElementById("err"); e.textContent=m; e.style.display="block"; }

const NAMED=new Set(["Enter","Backspace","Delete","Tab","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Home","End","PageUp","PageDown"]);
document.addEventListener("keydown",e=>{
  const printable = e.key.length===1 && !e.ctrlKey && !e.metaKey;
  if(printable || NAMED.has(e.key)){
    e.preventDefault();
    sendKey({key:e.key,ctrl:e.ctrlKey,meta:e.metaKey,shift:e.shiftKey,alt:e.altKey});
  }
});

// expose for headless drivers / debugging
window.fresh = { get view(){return view;}, refresh, sendKey };
refresh();
</script>
</body>
</html>
