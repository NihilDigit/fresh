# Publish to winget-pkgs after a release is created.
#
# Requires the WINGET_TOKEN secret. Cross-repo PR creation against
# microsoft/winget-pkgs needs a CLASSIC PAT with the `public_repo` scope --
# fine-grained PATs cannot open PRs against repos they aren't scoped to,
# and you can't scope a PAT to a repo you don't own.

name: Publish to winget

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.99)'
        required: true
        type: string

jobs:
  publish-winget:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure git credentials for github.com
        run: |
          # Drop any extraheader injected by actions/checkout so it can't
          # override our PAT for cross-repo pushes.
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global credential.helper store
          umask 077
          printf 'https://x-access-token:%s@github.com\n' "${GH_TOKEN}" > "${HOME}/.git-credentials"

      - name: Verify token has push access to sinelaw/winget-pkgs
        run: |
          set -euo pipefail
          REPO=sinelaw/winget-pkgs
          TEST_REF=refs/heads/__winget_publish_permission_test
          API=https://api.github.com/repos/${REPO}

          echo "Reading sinelaw/winget-pkgs metadata..."
          read_status=$(curl -sS -o /tmp/repo.json -w '%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}")
          if [ "$read_status" != "200" ]; then
            echo "::error::API read failed (HTTP $read_status). Token is invalid, expired, or lacks Metadata access on ${REPO}."
            cat /tmp/repo.json
            exit 1
          fi

          # The .permissions field on GET /repos reflects user permissions, not
          # fine-grained PAT scopes, so it can lie. Actually exercise Contents:write
          # by creating and then deleting a throwaway ref.
          echo "Probing Contents:write by creating ${TEST_REF}..."
          SHA=$(python3 -c "import json; print(json.load(open('/tmp/repo.json'))['default_branch'])" \
            | xargs -I{} curl -sSf \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${API}/git/refs/heads/{}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['object']['sha'])")

          create_status=$(curl -sS -o /tmp/create.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}/git/refs" \
            -d "{\"ref\":\"${TEST_REF}\",\"sha\":\"${SHA}\"}")

          if [ "$create_status" = "201" ]; then
            echo "OK: token has Contents:write on ${REPO}"
            curl -sS -o /dev/null -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "${API}/git/${TEST_REF}" || true
          elif [ "$create_status" = "422" ] && grep -q "already exists" /tmp/create.json; then
            echo "OK: test ref already exists from a prior run, treating as write success"
            curl -sS -o /dev/null -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "${API}/git/${TEST_REF}" || true
          else
            cat /tmp/create.json
            echo
            echo "::error::Token cannot write to ${REPO} (HTTP $create_status)."
            echo
            echo "Fix: regenerate WINGET_TOKEN as a CLASSIC PAT with public_repo scope."
            echo "Fine-grained PATs work for git push but cannot open cross-repo PRs"
            echo "against microsoft/winget-pkgs, which is required by this workflow."
            exit 1
          fi

      - name: Publish to winget-pkgs
        run: ./scripts/winget-publish.py "${VERSION}"
