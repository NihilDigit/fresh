# Publish to crates.io after a release is created

name: Publish to crates.io

on:
  workflow_call:
  workflow_dispatch:

jobs:
  publish-crates-io:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Remove unpublishable gui dep from fresh-editor
        run: |
          # fresh-gui depends on git-only ratatui-wgpu so it can't be on crates.io.
          # Strip the gui feature and fresh-gui dep so fresh-editor can be published.
          cd crates/fresh-editor
          sed -i '/fresh-gui/d; /fresh_gui/d' Cargo.toml
          sed -i '/^gui = \[/,/^\]/d' Cargo.toml

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish crates individually in dependency order, skipping
          # any that are already published (makes the workflow re-runnable).
          crates=(
            fresh-core
            fresh-languages
            fresh-parser-js
            fresh-plugin-api-macros
            fresh-winterm
            fresh-plugin-runtime
            fresh-editor
          )
          for crate in "${crates[@]}"; do
            echo "::group::Publishing $crate"
            flags=""
            if [ "$crate" = "fresh-editor" ]; then
              flags="--allow-dirty"
            fi
            if cargo publish -p "$crate" $flags 2>&1 | tee /tmp/publish.log; then
              echo "Published $crate"
            elif grep -q "already exists" /tmp/publish.log; then
              echo "Skipping $crate (already published)"
            else
              echo "::error::Failed to publish $crate"
              cat /tmp/publish.log
              exit 1
            fi
            echo "::endgroup::"
            sleep 15
          done
